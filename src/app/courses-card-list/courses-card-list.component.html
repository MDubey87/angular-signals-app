@for(course of courses(); track course.id){
<div class="course-card">
    <div class="course-header">
        <span class="course-title">{{ course.title }}</span>
    </div>
    <img class="course-image" [src]="course.iconUrl" [alt]="course.title" />
    <div class="course-desscription">
        <p>{{ course.longDescription }}</p>
    </div>
    <div class="course-actions">
        <button class="btn" [routerLink]="[ 'courses', course.id ]">
            View Course
        </button>
        <button class="btn" (click)="onEditCourse(course)">
            Edit Course
        </button>
        <img class="delete" src="/assets/icons/delete.svg" alt="Delete Course" (click)="onCourseDelete(course.id)" />
    </div>
</div>
}
